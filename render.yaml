# Render Blueprint — Titan OS (Next.js)
# Render Dashboard → New → Blueprint → connect this repo → Apply.

services:
  - type: web
    name: titan-os-web
    runtime: node
    plan: starter        # $7/mo — always-on, zero cold starts
    region: oregon       # change to singapore if your audience is in Asia
    buildCommand: cd apps/web && npm ci --include=dev && npx prisma generate && npm run build
    startCommand: cd apps/web && npx prisma migrate deploy && npm start
    healthCheckPath: /api/healthz

    envVars:
      # ── Runtime ────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"

      # ── Database (Supabase) ─────────────────────────────────────────
      # DATABASE_URL  → pooler connection (port 6543, ?pgbouncer=true) — runtime queries
      # DIRECT_URL    → direct connection (port 5432, no pgbouncer) — prisma migrate
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false

      # ── Auth ───────────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false
      - key: FERNET_KEY
        sync: false

      # ── App URL (set to your *.onrender.com or custom domain) ──────
      - key: NEXT_PUBLIC_APP_URL
        sync: false

      # ── Instagram OAuth ────────────────────────────────────────────
      - key: INSTAGRAM_APP_ID
        sync: false
      - key: INSTAGRAM_APP_SECRET
        sync: false
      - key: INSTAGRAM_REDIRECT_URI
        sync: false

      # ── Cloudinary ─────────────────────────────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # ── Anthropic ──────────────────────────────────────────────────
      - key: ANTHROPIC_API_KEY
        sync: false
