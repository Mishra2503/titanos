# Render Blueprint — Titan OS (Next.js)
# Render Dashboard → New → Blueprint → connect this repo → Apply.

services:
  - type: web
    name: titan-os-web
    runtime: node
    plan: starter        # $7/mo — always-on, zero cold starts
    region: oregon       # change to singapore if your audience is in Asia
    buildCommand: cd apps/web && npm ci && npx prisma generate && npm run build
    startCommand: cd apps/web && npx prisma migrate deploy && npm start
    healthCheckPath: /api/healthz

    envVars:
      # ── Runtime ────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"

      # ── Database (Supabase) ─────────────────────────────────────────
      # DATABASE_URL → transaction-pooler connection (port 6543) — runtime queries.
      # Migrations derive the IPv4 session pooler (port 5432) from it automatically
      # (see prisma.config.ts); DIRECT_URL is only a fallback for non-Supabase DBs.
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false

      # ── Auth ───────────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false
      - key: FERNET_KEY
        sync: false

      # ── App URL (set to your *.onrender.com or custom domain) ──────
      - key: NEXT_PUBLIC_APP_URL
        sync: false

      # ── Instagram OAuth ────────────────────────────────────────────
      - key: INSTAGRAM_APP_ID
        sync: false
      - key: INSTAGRAM_APP_SECRET
        sync: false
      - key: INSTAGRAM_REDIRECT_URI
        sync: false

      # ── Object storage (Cloudflare R2 / any S3-compatible) ─────────
      # Browser uploads go straight to the bucket via presigned PUT;
      # Instagram fetches published videos from S3_PUBLIC_BASE_URL.
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_PUBLIC_BASE_URL
        sync: false

      # ── Anthropic ──────────────────────────────────────────────────
      - key: ANTHROPIC_API_KEY
        sync: false

      # ── Competitor sync scraper (reel views + video URLs) ──────────
      - key: APIFY_TOKEN
        sync: false

      # ── Video analysis ("watch the reels") ─────────────────────────
      # GROQ_API_KEY: free key from console.groq.com — transcribes reel
      # audio (whisper). Without it, analysis still runs frames-only.
      - key: GROQ_API_KEY
        sync: false
      - key: VIDEO_ANALYSIS_MODEL
        value: claude-sonnet-5

      # ── External cron backstop for /api/schedule/tick ──────────────
      - key: CRON_SECRET
        sync: false
